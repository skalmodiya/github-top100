<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Top 100 Repositories by Stars</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --text: #1a1a2e;
      --text-muted: #57606a;
      --border: #d0d7de;
      --link: #0969da;
      --link-hover: #0550ae;
      --hover-bg: #f0f6ff;
      --header-bg: #f6f8fa;
      --sort-arrow: #6e7781;
      --sort-active: #0969da;
      --badge-bg: #eaeef2;
      --badge-text: #24292f;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --star-color: #bf8700;
      --fork-color: #0969da;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --border: #30363d;
      --link: #58a6ff;
      --link-hover: #79c0ff;
      --hover-bg: #1c2128;
      --header-bg: #161b22;
      --sort-arrow: #6e7781;
      --sort-active: #58a6ff;
      --badge-bg: #21262d;
      --badge-text: #e6edf3;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
      --star-color: #d29922;
      --fork-color: #58a6ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }

    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 svg { flex-shrink: 0; }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #search {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      width: 220px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #search:focus {
      border-color: var(--sort-active);
      box-shadow: 0 0 0 3px rgba(9, 105, 218, .15);
    }
    [data-theme="dark"] #search:focus {
      box-shadow: 0 0 0 3px rgba(88, 166, 255, .15);
    }
    #search::placeholder { color: var(--text-muted); }

    #theme-toggle {
      background: var(--badge-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      padding: 5px 12px;
      transition: background .15s;
    }
    #theme-toggle:hover { background: var(--hover-bg); }

    .meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    #result-count { font-weight: 500; }

    main { padding: 16px 24px 40px; }

    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 640px;
    }

    thead { background: var(--header-bg); }

    th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
      position: sticky;
      top: 0;
      background: var(--header-bg);
    }
    th[data-col] {
      cursor: pointer;
    }
    th[data-col]:hover { color: var(--text); }
    th[data-col]::after {
      content: " ⇅";
      color: var(--sort-arrow);
      font-size: 11px;
    }
    th[data-col].sort-asc::after { content: " ↑"; color: var(--sort-active); }
    th[data-col].sort-desc::after { content: " ↓"; color: var(--sort-active); }
    th[data-col].sort-asc,
    th[data-col].sort-desc { color: var(--sort-active); }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--hover-bg); }

    .col-rank { width: 52px; text-align: center; color: var(--text-muted); font-weight: 600; }
    .col-name { width: 18%; }
    .col-desc { }
    .col-stars { width: 96px; text-align: right; }
    .col-forks { width: 80px; text-align: right; }
    .col-lang { width: 100px; }
    .col-updated { width: 110px; white-space: nowrap; }

    .repo-link {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
      word-break: break-word;
    }
    .repo-link:hover { color: var(--link-hover); text-decoration: underline; }

    .desc-cell {
      color: var(--text-muted);
      font-size: 13px;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat { display: inline-flex; align-items: center; gap: 4px; font-variant-numeric: tabular-nums; }
    .stars { color: var(--star-color); }
    .forks { color: var(--fork-color); }

    .lang-badge {
      display: inline-block;
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 20px;
      font-size: 11px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .no-results {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 15px;
    }

    footer {
      text-align: center;
      padding: 16px;
      color: var(--text-muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    footer a { color: var(--link); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      main { padding: 12px 16px 32px; }
      .col-desc, .col-updated { display: none; }
      #search { width: 160px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1>
        <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub Top 100 Repositories
      </h1>
      <div class="controls">
        <input id="search" type="search" placeholder="Search repos…" autocomplete="off" spellcheck="false">
        <button id="theme-toggle" aria-label="Toggle color theme">🌙 Dark</button>
      </div>
    </div>
    <div class="meta">
      <span id="result-count"></span>
      <span id="last-updated"></span>
    </div>
  </header>

  <main>
    <div class="table-wrapper">
      <table id="repo-table" aria-label="Top GitHub repositories by stars">
        <thead>
          <tr>
            <th class="col-rank" data-col="rank">#</th>
            <th class="col-name" data-col="full_name">Repository</th>
            <th class="col-desc">Description</th>
            <th class="col-stars" data-col="stargazers_count">Stars</th>
            <th class="col-forks" data-col="forks_count">Forks</th>
            <th class="col-lang" data-col="language">Language</th>
            <th class="col-updated" data-col="pushed_at">Last Push</th>
          </tr>
        </thead>
        <tbody id="repo-body"></tbody>
      </table>
    </div>
  </main>

  <footer>
    Data sourced from the <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">GitHub REST API</a>.
    Updates every day at 02:00 UTC via GitHub Actions.
  </footer>

  <script>
    const REPO_DATA = /*__REPO_DATA__*/{};

    (function () {
      const items = REPO_DATA.items || [];
      const generatedAt = REPO_DATA.generated_at || null;

      let currentItems = [...items];
      let sortKey = 'rank';
      let sortDir = 'asc';
      let filterText = '';

      // --- Theme ---
      const body = document.body;
      const themeBtn = document.getElementById('theme-toggle');

      function applyTheme(dark) {
        body.setAttribute('data-theme', dark ? 'dark' : 'light');
        themeBtn.textContent = dark ? '☀️ Light' : '🌙 Dark';
      }

      function initTheme() {
        const saved = localStorage.getItem('gh100-theme');
        if (saved) {
          applyTheme(saved === 'dark');
        } else {
          applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
        }
      }

      themeBtn.addEventListener('click', function () {
        const isDark = body.getAttribute('data-theme') === 'dark';
        applyTheme(!isDark);
        localStorage.setItem('gh100-theme', !isDark ? 'dark' : 'light');
      });

      initTheme();

      // --- Last updated ---
      if (generatedAt) {
        try {
          const d = new Date(generatedAt);
          document.getElementById('last-updated').textContent =
            'Updated: ' + d.toLocaleString('en-US', {
              year: 'numeric', month: 'short', day: 'numeric',
              hour: '2-digit', minute: '2-digit', timeZone: 'UTC', timeZoneName: 'short'
            });
        } catch (_) {}
      }

      // --- Sort ---
      const numCols = new Set(['rank', 'stargazers_count', 'forks_count']);

      function sortItems(data) {
        return [...data].sort(function (a, b) {
          let av = a[sortKey], bv = b[sortKey];
          if (numCols.has(sortKey)) {
            return sortDir === 'asc' ? av - bv : bv - av;
          }
          av = (av || '').toLowerCase();
          bv = (bv || '').toLowerCase();
          const cmp = av.localeCompare(bv);
          return sortDir === 'asc' ? cmp : -cmp;
        });
      }

      // --- Filter ---
      function filterItems() {
        if (!filterText) return [...items];
        const q = filterText.toLowerCase();
        return items.filter(function (r) {
          return r.full_name.toLowerCase().includes(q) ||
            r.description.toLowerCase().includes(q) ||
            r.language.toLowerCase().includes(q);
        });
      }

      // --- Format helpers ---
      function fmtNum(n) {
        if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
        return n.toLocaleString();
      }

      function fmtDate(iso) {
        if (!iso) return '';
        try {
          const d = new Date(iso);
          const now = new Date();
          const diff = Math.floor((now - d) / 86400000);
          if (diff === 0) return 'today';
          if (diff === 1) return 'yesterday';
          if (diff < 30) return diff + 'd ago';
          if (diff < 365) return Math.floor(diff / 30) + 'mo ago';
          return Math.floor(diff / 365) + 'yr ago';
        } catch (_) { return ''; }
      }

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      // --- Render ---
      function render() {
        const sorted = sortItems(currentItems);
        const tbody = document.getElementById('repo-body');

        if (!sorted.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="no-results">No repositories match your search.</td></tr>';
          document.getElementById('result-count').textContent = '0 results';
          return;
        }

        document.getElementById('result-count').textContent =
          sorted.length === items.length
            ? items.length + ' repositories'
            : sorted.length + ' of ' + items.length + ' repositories';

        const frag = document.createDocumentFragment();
        sorted.forEach(function (r) {
          const tr = document.createElement('tr');
          tr.innerHTML =
            '<td class="col-rank">' + r.rank + '</td>' +
            '<td class="col-name"><a class="repo-link" href="' + escHtml(r.html_url) + '" target="_blank" rel="noopener">' + escHtml(r.full_name) + '</a></td>' +
            '<td class="col-desc"><span class="desc-cell" title="' + escHtml(r.description) + '">' + escHtml(r.description) + '</span></td>' +
            '<td class="col-stars"><span class="stat stars">★ ' + fmtNum(r.stargazers_count) + '</span></td>' +
            '<td class="col-forks"><span class="stat forks">⑂ ' + fmtNum(r.forks_count) + '</span></td>' +
            '<td class="col-lang">' + (r.language ? '<span class="lang-badge">' + escHtml(r.language) + '</span>' : '') + '</td>' +
            '<td class="col-updated">' + fmtDate(r.pushed_at) + '</td>';
          frag.appendChild(tr);
        });

        tbody.replaceChildren(frag);
      }

      // --- Column header click sorting ---
      document.querySelectorAll('th[data-col]').forEach(function (th) {
        th.addEventListener('click', function () {
          const col = th.getAttribute('data-col');
          if (sortKey === col) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            sortKey = col;
            sortDir = col === 'rank' ? 'asc' : 'desc';
          }
          document.querySelectorAll('th[data-col]').forEach(function (t) {
            t.classList.remove('sort-asc', 'sort-desc');
          });
          th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
          render();
        });
      });

      // Set initial sort indicator
      const rankTh = document.querySelector('th[data-col="rank"]');
      if (rankTh) rankTh.classList.add('sort-asc');

      // --- Search ---
      document.getElementById('search').addEventListener('input', function (e) {
        filterText = e.target.value.trim();
        currentItems = filterItems();
        render();
      });

      // --- Initial render ---
      if (items.length === 0) {
        document.getElementById('repo-body').innerHTML =
          '<tr><td colspan="7" class="no-results">No data available. Run the fetch script to populate this page.</td></tr>';
        document.getElementById('result-count').textContent = '0 repositories';
      } else {
        render();
      }
    })();
  </script>
</body>
</html>
